name: moveit2-demo

title: MoveIt2 demo snap for ctrlX

version: '1.0.0'

summary: Tests MoveIt2 and ros2_control pipeline for ctrlX CORE

description: |
  Tests the MoveIt2 overlay snap running on top of ros2-base-humble.

base: core22

grade: devel
confinement: strict

architectures:
  - build-on: [amd64, arm64]
    build-for: [amd64]

  - build-on: [amd64, arm64]
    build-for: [arm64]

parts:
  moveit-demo:
    plugin: dump
    source: ./install
    stage-packages: # Panda
      - ros-humble-moveit-resources-panda-description 
      - ros-humble-moveit-resources-panda-moveit-config
  scripts:
    plugin: dump
    source: ./scripts
    organize:
      '*': usr/bin/

apps:
  demo:
    command: usr/bin/run-demo.sh
    environment:
      ROS_DISTRO: humble
      RMW_IMPLEMENTATION: rmw_cyclonedds_cpp
    plugs:
      - ros-base
      - moveit-runtime
      - network
      - network-bind

plugs:
  ros-base:
    interface: content
    content: executables
    target: $SNAP/rosruntime
  moveit-runtime:
    interface: content
    content: moveit-runtime
    target: $SNAP/moveit-runtime