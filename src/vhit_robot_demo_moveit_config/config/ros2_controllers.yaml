# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    robot_group_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

robot_group_controller:
  ros__parameters:
    joints:
      - rotbase
      - shoulder_joint
      - elbow
      - wrist_pitch
      - wrist_roll
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity